site_name: Metro Stad Docs
site_description: Officiele documentatie voor Metro Stad met regels, procedures en kaarten.
site_url: https://apv.metrostad.nl/
repo_url: https://github.com/exqlusive/metrostad-apv
repo_name: exqlusive/metrostad-apv
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: overrides
  language: nl
  logo: assets/main_inverted.png
  favicon: assets/main_inverted.png
  font: false
  icon:
    repo: fontawesome/brands/github
    tag:
      algemeen: material/home-outline
      regels: material/gavel
      overheid: material/shield-account
      criminaliteit: material/bank
      kaart: material/map-marker-radius
      economie: material/cash-multiple
      community: material/account-group
      privacy: material/lock-outline
      streaming: material/video-outline
      in-ontwikkeling: material/hammer-wrench
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Schakel naar donkere modus
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Schakel naar lichte modus
plugins:
  - search:
      lang: nl
      separator: '[\s\-]+'
  - social:
      enabled: !ENV [CI, false]
      cards_layout_options:
        font_family: Ubuntu
  - tags
  - privacy:
      enabled: !ENV [CI, false]
  - optimize:
      enabled: !ENV [MKDOCS_OPTIMIZE, false]
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
extra:
  generator: false
  homepage: https://metrostad.nl/
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/metrostad
      name: Metro Stad Discord
    - icon: fontawesome/brands/github
      link: https://github.com/exqlusive/metrostad-apv
      name: GitHub repository
    - icon: material/web
      link: https://metrostad.nl/
      name: Metro Stad Website
  tags:
    Algemeen: algemeen
    Regels: regels
    Overheid: overheid
    Criminaliteit: criminaliteit
    Kaart: kaart
    Economie: economie
    Community: community
    Privacy: privacy
    Streaming: streaming
    In ontwikkeling: in-ontwikkeling
extra_css:
  - stylesheets/extra.css
not_in_nav: |
  backup.md
  voertuigen_en_inhoud.md
  includes/*
copyright: |
  &copy; 2026 Metro Stad
nav:
  - Start: index.md
  - Regels:
      - Algemene Plaatselijke Verordening (APV):
          - Overzicht: apv.md
          - Spelkwaliteit & Scenario's: apv/spelkwaliteit-en-scenarios.md
          - Accounts, Voertuigen & Platform: apv/accounts-voertuigen-platform.md
          - Criminaliteit & Groeperingen: apv/criminaliteit-en-groeperingen.md
          - Refunds & Speciale Situaties: apv/refunds-en-speciale-situaties.md
      - Overvallen & Scenarios:
          - Overzicht: overvallen.md
          - Basisovervallen: overvallen/basisovervallen.md
          - Zware Scenarios: overvallen/zware-scenarios.md
          - Maatwerk & Eisen: overvallen/maatwerk-en-eisen.md
      - Politie Wetboek:
          - Overzicht: politie_wetboek.md
          - Algemene Bepalingen: politie_wetboek/algemene-bepalingen.md
          - Vermogensdelicten: politie_wetboek/vermogensdelicten.md
          - Geweldsdelicten: politie_wetboek/geweldsdelicten.md
          - Verkeersdelicten: politie_wetboek/verkeersdelicten.md
          - Opiumwet: politie_wetboek/opiumwet.md
          - Wet Wapens en Munitie: politie_wetboek/wet-wapens-en-munitie.md
          - Overige Feiten: politie_wetboek/overige-feiten.md
      - Ambulance Handboek:
          - Overzicht: ambulance_handboek.md
          - Organisatie & Loopbaan: ambulance/organisatie-en-loopbaan.md
          - Communicatie & Meldkamer: ambulance/communicatie-en-meldkamer.md
          - Medische Protocollen: ambulance/medische-protocollen.md
          - Operatie & Voertuigen: ambulance/operatie-en-voertuigen.md
          - Wetgeving & Bevoegdheden: ambulance/wetgeving-en-bevoegdheden.md
          - GRIP & Training: ambulance/grip-en-training.md
          - Dienstregels & Nazorg: ambulance/dienstregels-en-nazorg.md
  - Kaarten:
      - Risico Gebieden: risico_gebieden.md
      - Douane Gebieden: douane_gebieden.md
      - No Fly Zones: no_fly_zones.md
  - Platform:
      - Belastingen: belastingen.md
      - Streamen: streamen.md
      - Privacyverklaring:
          - Overzicht: privacy_verklaring.md
          - Gegevens & Doeleinden: privacy/gegevens-en-doeleinden.md
          - Delen & Bewaartermijnen: privacy/delen-en-bewaartermijnen.md
          - Uw Rechten & Klachten: privacy/rechten-en-klachten.md
      - Onderwerpen & Tags: tags.md
